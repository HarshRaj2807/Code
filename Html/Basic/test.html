<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            background-color: red;
        }

        .bob {
            font-size: larger;
            color: blueviolet;
        }

        #Dhw2 {
            background-color: green;
            color: pink;
        }
    </style>
</head>

<body>
    <h1 style="color: green;">This is Inline CSS</h1>
    <h2>This is Internal CSS</h2>
    <h3>This is External CSS</h3>
    <h1 class="bob">This is Class Selector Example.</h1>
    <h2 id="Dhw2"> this is ID selector Example.</h2>
</body>

</html>
